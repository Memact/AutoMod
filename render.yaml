services:
  - type: web
    name: memact-automod
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /healthz
    envVars:
      - key: MEMACT_TOKEN
        sync: false
      - key: MEMACT_GUILD_ID
        value: "1404684829785718885"
      - key: MEMACT_DATABASE
        value: data/memact_automod.db
      - key: PYTHONUNBUFFERED
        value: "1"
